<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POWR — Dashboard Socios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f5f0;
      --color-background-tertiary: #eeede8;
      --color-background-info: #e6f1fb;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-text-tertiary: #888780;
      --color-text-info: #0c447c;
      --color-border-tertiary: rgba(0,0,0,0.12);
      --color-border-secondary: rgba(0,0,0,0.22);
      --color-border-primary: rgba(0,0,0,0.35);
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1e1e1c;
        --color-background-secondary: #2a2a27;
        --color-background-tertiary: #252523;
        --color-background-info: #0c2a47;
        --color-text-primary: #f0efe9;
        --color-text-secondary: #b4b2a9;
        --color-text-tertiary: #888780;
        --color-text-info: #85b7eb;
        --color-border-tertiary: rgba(255,255,255,0.10);
        --color-border-secondary: rgba(255,255,255,0.18);
        --color-border-primary: rgba(255,255,255,0.28);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background: var(--color-background-tertiary);
      color: var(--color-text-primary);
      min-height: 100vh;
    }
    .page { max-width: 900px; margin: 0 auto; padding: 20px 16px 40px; }

    .hdr { padding: 16px 0 14px; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-icon { width: 34px; height: 34px; border-radius: 9px; background: #185fa5; display: flex; align-items: center; justify-content: center; }
    .brand-icon i { color: #fff; font-size: 17px; }
    .bt p:first-child { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
    .bt p:last-child { font-size: 11px; color: var(--color-text-tertiary); margin-top: 1px; }
    .live-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; color: #0f6e56; background: #e1f5ee; padding: 3px 10px; border-radius: 20px; }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: #1d9e75; }

    .filters { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 12px 14px; margin-bottom: 16px; }
    .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-label { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); white-space: nowrap; text-transform: uppercase; letter-spacing: .04em; }
    .fsel { font-size: 12px; padding: 5px 10px 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; min-width: 110px; }
    .finput { font-size: 12px; padding: 5px 8px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); width: 110px; }
    .fclear { font-size: 11px; padding: 5px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; gap: 4px; margin-left: 4px; }
    .fclear:hover { background: var(--color-background-secondary); }
    .filter-sep { width: 0.5px; height: 20px; background: var(--color-border-secondary); margin: 0 4px; }
    .filter-info { font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--color-border-tertiary); }

    .nav { display: flex; gap: 0; border-bottom: 0.5px solid var(--color-border-tertiary); margin-bottom: 16px; }
    .nb { padding: 8px 16px; font-size: 13px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); border-bottom: 2px solid transparent; display: flex; align-items: center; gap: 5px; margin-bottom: -1px; }
    .nb i { font-size: 14px; }
    .nb.on { color: #185fa5; border-bottom-color: #185fa5; font-weight: 500; }
    .nb:hover:not(.on) { color: var(--color-text-primary); }

    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(115px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .kc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; }
    .kc.ag { border-left: 3px solid #1d9e75; border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0; padding-left: 11px; }
    .kc.ar { border-left: 3px solid #a32d2d; border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0; padding-left: 11px; }
    .kc.ab { border-left: 3px solid #ba7517; border-radius: 0 var(--border-radius-lg) var(--border-radius-lg) 0; padding-left: 11px; }
    .kl { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
    .kv { font-size: 22px; font-weight: 500; color: var(--color-text-primary); line-height: 1; }
    .kv.g { color: #0f6e56; } .kv.r { color: #a32d2d; } .kv.b { color: #185fa5; }
    .ks { font-size: 10px; color: var(--color-text-tertiary); margin-top: 2px; }
    .kpill { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 500; }
    .kg { background: #eaf3de; color: #27500a; } .kr { background: #fcebeb; color: #791f1f; } .ka { background: #faeeda; color: #633806; }

    .sh { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
    .st { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); display: flex; align-items: center; gap: 5px; }
    .st i { font-size: 14px; }
    .tgw { display: flex; background: var(--color-background-secondary); border-radius: 20px; padding: 2px; gap: 2px; }
    .tg { padding: 3px 10px; border-radius: 18px; font-size: 11px; cursor: pointer; background: transparent; border: none; color: var(--color-text-secondary); }
    .tg.on { background: var(--color-background-primary); color: var(--color-text-primary); font-weight: 500; border: 0.5px solid var(--color-border-secondary); }
    .leg { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .leg span { display: flex; align-items: center; gap: 4px; font-size: 11px; color: var(--color-text-secondary); }
    .ld { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .ll { width: 16px; height: 3px; border-radius: 2px; flex-shrink: 0; }
    .cw { position: relative; width: 100%; }
    .dg { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 14px; }
    .dc { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 12px 14px; }
    .dt { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
    .dt i { font-size: 13px; }
    .dl { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; }
    .dl span { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--color-text-secondary); }
    .dl .dv { margin-left: auto; font-size: 11px; font-weight: 500; color: var(--color-text-primary); }
    .divhr { height: 0.5px; background: var(--color-border-tertiary); margin: 14px 0; }
    .tw { overflow-x: auto; border-radius: var(--border-radius-lg); border: 0.5px solid var(--color-border-tertiary); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th { padding: 9px 12px; border-bottom: 0.5px solid var(--color-border-secondary); color: var(--color-text-secondary); font-weight: 500; text-align: left; background: var(--color-background-secondary); white-space: nowrap; }
    td { padding: 8px 12px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); white-space: nowrap; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--color-background-secondary); }
    .note { font-size: 10px; color: var(--color-text-tertiary); margin-top: 8px; }
    .db-wrap { display: flex; gap: 4px; }
    .db { padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); font-size: 11px; cursor: pointer; background: transparent; color: var(--color-text-secondary); }
    .db.on { background: #e6f1fb; color: #0c447c; border-color: #185fa5; font-weight: 500; }
    .empty { padding: 2rem; text-align: center; color: var(--color-text-tertiary); font-size: 13px; }
  </style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="brand">
      <div class="brand-icon"><i class="ti ti-chart-bar"></i></div>
      <div class="bt">
        <p>POWR — socios</p>
        <p>Rio Mixcoac</p>
      </div>
    </div>
    <span class="live-pill"><span class="live-dot"></span>En vivo · Jun 2026</span>
  </div>

  <div class="filters">
    <div class="filter-row">
      <div class="filter-group">
        <span class="filter-label">Desde</span>
        <input class="finput" type="date" id="fDesde" value="2025-03-01">
      </div>
      <div class="filter-group">
        <span class="filter-label">Hasta</span>
        <input class="finput" type="date" id="fHasta" value="2026-05-31">
      </div>
      <span class="filter-sep"></span>
      <div class="filter-group">
        <span class="filter-label">Plan</span>
        <select class="fsel" id="fPlan">
          <option value="">Todos</option>
          <option value="Básico">Básico</option>
          <option value="Resultados">Resultados</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Frecuencia</span>
        <select class="fsel" id="fCuota">
          <option value="">Todas</option>
          <option value="MENSUAL">Mensual</option>
          <option value="SEMESTRAL">Semestral</option>
          <option value="ANUAL">Anual</option>
          <option value="TRIMESTRAL">Trimestral</option>
          <option value="BIMESTRAL">Bimestral</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Forma de pago</span>
        <select class="fsel" id="fPago">
          <option value="">Todas</option>
          <option value="Tarjeta">Tarjeta</option>
          <option value="OpenPay Recurrente">OpenPay</option>
          <option value="Caja">Caja</option>
        </select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Estado</span>
        <select class="fsel" id="fEstado">
          <option value="">Todos</option>
          <option value="ACTIVO">Activo</option>
          <option value="BAJA">Baja</option>
          <option value="AUSENTE">Ausente</option>
        </select>
      </div>
      <button class="fclear" onclick="clearFilters()"><i class="ti ti-x" style="font-size:11px"></i>Limpiar</button>
    </div>
    <div class="filter-info" id="filterInfo"></div>
  </div>

  <div class="nav">
    <button class="nb on" id="t-resumen" onclick="show('resumen')"><i class="ti ti-layout-dashboard"></i>Resumen</button>
    <button class="nb" id="t-mensual" onclick="show('mensual')"><i class="ti ti-trending-up"></i>Mensual</button>
    <button class="nb" id="t-mix" onclick="show('mix')"><i class="ti ti-chart-donut"></i>Mix</button>
    <button class="nb" id="t-tabla" onclick="show('tabla')"><i class="ti ti-table"></i>Tabla</button>
  </div>

  <div id="v-resumen">
    <div class="kpi-grid" id="kpis-r"></div>
    <div class="sh">
      <span class="st"><i class="ti ti-chart-bar"></i>Altas y bajas por mes</span>
      <div class="tgw"><button class="tg on" id="tg-rn" onclick="setT('r','n')">Número</button><button class="tg" id="tg-rp" onclick="setT('r','p')">Porcentaje</button></div>
    </div>
    <div class="leg"><span><span class="ld" style="background:#b5d4f4"></span>Altas</span><span><span class="ld" style="background:#f7c1c1"></span>Bajas</span><span><span class="ll" style="background:#1d9e75"></span>Acumulado</span></div>
    <div class="cw" style="height:240px"><canvas id="cR"></canvas></div>
    <div class="dg" id="donuts-r"></div>
  </div>

  <div id="v-mensual" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-trending-up"></i>Altas, bajas y neto</span>
      <div class="tgw"><button class="tg on" id="tg-mn" onclick="setT('m','n')">Número</button><button class="tg" id="tg-mp" onclick="setT('m','p')">Porcentaje</button></div>
    </div>
    <div class="leg"><span><span class="ld" style="background:#b5d4f4"></span>Altas</span><span><span class="ld" style="background:#f7c1c1"></span>Bajas</span><span><span class="ll" style="background:#1d9e75"></span>Neto</span></div>
    <div class="cw" style="height:250px"><canvas id="cM"></canvas></div>
    <div class="divhr"></div>
    <div class="sh" style="margin-bottom:8px"><span class="st"><i class="ti ti-shield-check"></i>Retención mensual</span></div>
    <div class="cw" style="height:160px"><canvas id="cRet"></canvas></div>
  </div>

  <div id="v-mix" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-stack"></i>Evolución 100% apilado</span>
      <div class="db-wrap">
        <button class="db on" id="dim-plan" onclick="setDim('plan')">Plan</button>
        <button class="db" id="dim-cuota" onclick="setDim('cuota')">Frecuencia</button>
        <button class="db" id="dim-pago" onclick="setDim('pago')">Pago</button>
      </div>
    </div>
    <div class="leg" id="lStack" style="margin-bottom:8px"></div>
    <div class="cw" style="height:250px"><canvas id="cStack"></canvas></div>
    <div class="dg" id="donuts-m"></div>
  </div>

  <div id="v-tabla" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-table"></i>Detalle mensual</span>
      <span id="tbl-sub" style="font-size:11px;color:var(--color-text-tertiary)"></span>
    </div>
    <div class="tw"><table id="tblMain"></table></div>
    <p class="note">* Retención = 1 − (bajas del mes / altas del mes)</p>
  </div>

</div>

function getF(){
  const desde=document.getElementById('fDesde').value;
  const hasta=document.getElementById('fHasta').value;
  const plan=document.getElementById('fPlan').value;
  const cuota=document.getElementById('fCuota').value;
  const pago=document.getElementById('fPago').value;
  const estado=document.getElementById('fEstado').value;
  return ROWS.filter(r=>{
    if(desde&&r.fecha<desde)return false;
    if(hasta&&r.fecha>hasta)return false;
    if(plan&&r.plan!==plan)return false;
    if(cuota&&r.cuota!==cuota)return false;
    if(pago&&r.pago!==pago)return false;
    if(estado&&r.estado!==estado)return false;
    return true;
  });
}

function getFnoEstado(){
  const desde=document.getElementById('fDesde').value;
  const hasta=document.getElementById('fHasta').value;
  const plan=document.getElementById('fPlan').value;
  const cuota=document.getElementById('fCuota').value;
  const pago=document.getElementById('fPago').value;
  return ROWS.filter(r=>{
    if(desde&&r.fecha<desde)return false;
    if(hasta&&r.fecha>hasta)return false;
    if(plan&&r.plan!==plan)return false;
    if(cuota&&r.cuota!==cuota)return false;
    if(pago&&r.pago!==pago)return false;
    return true;
  });
}

function getMeses(rows){
  const present=new Set(rows.map(r=>r.mes));
  return MESES.filter(m=>present.has(m));
}

function getMon(rows){
  return getMeses(rows).map(m=>{
    const s=rows.filter(r=>r.mes===m);
    const n=s.length,b=s.filter(r=>r.estado==='BAJA').length;
    return{m,lbl:ML[m],n,b,net:n-b};
  });
}

function countBy(rows,key){
  const out={};
  rows.forEach(r=>{const v=r[key]||'N/A';out[v]=(out[v]||0)+1;});
  return out;
}

function mkC(id,cfg){
  if(CH[id]){CH[id].destroy();delete CH[id];}
  const el=document.getElementById(id);
  if(el)CH[id]=new Chart(el,cfg);
}

function donut(id,data,cmap,legId){
  const keys=Object.keys(data).sort((a,b)=>data[b]-data[a]);
  const tot=Object.values(data).reduce((s,v)=>s+v,0)||1;
  mkC(id,{type:'doughnut',data:{labels:keys,datasets:[{data:keys.map(k=>data[k]),backgroundColor:keys.map(k=>cmap[k]||'#888'),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${ctx.parsed} (${Math.round(ctx.parsed/tot*100)}%)`}}}}});
  const el=document.getElementById(legId);
  if(el)el.innerHTML=keys.map(k=>`<span><span style="width:9px;height:9px;border-radius:2px;background:${cmap[k]||'#888'};flex-shrink:0;display:inline-block"></span><span>${k.replace('OpenPay Recurrente','OpenPay')}</span><span class="dv">${data[k]} <span style="color:var(--color-text-tertiary);font-weight:400">${Math.round(data[k]/tot*100)}%</span></span></span>`).join('');
}

  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:v=>p?v+'%':v,font:{size:11}}},y2:{position:'right',grid:{drawOnChartArea:false},ticks:{font:{size:11}}},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}}}}});
  const el=document.getElementById('donuts-r');
  el.innerHTML=`<div class="dc"><p class="dt"><i class="ti ti-id-badge"></i>Por plan</p><div class="cw" style="height:110px"><canvas id="cDP"></canvas></div><div class="dl" id="lDP"></div></div><div class="dc"><p class="dt"><i class="ti ti-calendar-repeat"></i>Por frecuencia</p><div class="cw" style="height:110px"><canvas id="cDC"></canvas></div><div class="dl" id="lDC"></div></div><div class="dc"><p class="dt"><i class="ti ti-credit-card"></i>Por forma de pago</p><div class="cw" style="height:110px"><canvas id="cDG"></canvas></div><div class="dl" id="lDG"></div></div>`;
  requestAnimationFrame(()=>{donut('cDP',countBy(rows,'plan'),CP,'lDP');donut('cDC',countBy(rows,'cuota'),CC,'lDC');donut('cDG',countBy(rows,'pago'),CPG,'lDG');});
}

function renderMensual(){
  const rows=getF(),mon=getMon(rows),p=tM==='p';
  mkC('cM',{type:'bar',data:{labels:mon.map(d=>d.lbl),datasets:[
    {type:'bar',label:'Altas',data:mon.map(d=>p?Math.round(d.n/Math.max(d.n+d.b,1)*100):d.n),backgroundColor:'#b5d4f4',borderColor:'#185fa5',borderWidth:1,borderRadius:3},
    {type:'bar',label:'Bajas',data:mon.map(d=>p?-Math.round(d.b/Math.max(d.n+d.b,1)*100):-d.b),backgroundColor:'#f7c1c1',borderColor:'#a32d2d',borderWidth:1,borderRadius:3},
    {type:'line',label:'Neto',data:mon.map(d=>p?Math.round(d.net/Math.max(d.n+d.b,1)*100):d.net),borderColor:'#1d9e75',backgroundColor:'transparent',borderWidth:2,pointRadius:3,tension:.3}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:v=>p?(v<0?v+'%':'+'+v+'%'):(v<0?v:'+'+v),font:{size:11}}},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}}}}});
  const rets=mon.map(d=>d.n>0?Math.round((1-d.b/d.n)*100):100);
  mkC('cRet',{type:'line',data:{labels:mon.map(d=>d.lbl),datasets:[{label:'Retención %',data:rets,borderColor:'#1d9e75',backgroundColor:'rgba(29,158,117,.07)',fill:true,borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:'#1d9e75'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:110,grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:v=>v+'%',font:{size:11}}},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}}}}});
}

function renderMix(){
  const rows=getF(),meses=getMeses(rows);
  const CMAP=curDim==='plan'?CP:curDim==='cuota'?CC:CPG;
  const keys=[...new Set(rows.map(r=>r[curDim]))].filter(Boolean);
  const datasets=keys.map(k=>(({label:k,data:meses.map(m=>{const s=rows.filter(r=>r.mes===m);return s.length?Math.round(s.filter(r=>r[curDim]===k).length/s.length*100):0;}),backgroundColor:CMAP[k]||'#888',borderWidth:0}))).filter(ds=>ds.data.some(v=>v>0));
  document.getElementById('lStack').innerHTML=datasets.map(ds=>`<span><span class="ld" style="background:${ds.backgroundColor}"></span>${ds.label.replace('OpenPay Recurrente','OpenPay')}</span>`).join('');
  mkC('cStack',{type:'bar',data:{labels:meses.map(m=>ML[m]),datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},y:{stacked:true,max:100,grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:v=>v+'%',font:{size:11}}}}}});
  const el=document.getElementById('donuts-m');
  el.innerHTML=`<div class="dc"><p class="dt"><i class="ti ti-id-badge"></i>Por plan</p><div class="cw" style="height:110px"><canvas id="cMP"></canvas></div><div class="dl" id="lMP"></div></div><div class="dc"><p class="dt"><i class="ti ti-calendar-repeat"></i>Por frecuencia</p><div class="cw" style="height:110px"><canvas id="cMC"></canvas></div><div class="dl" id="lMC"></div></div><div class="dc"><p class="dt"><i class="ti ti-credit-card"></i>Por forma de pago</p><div class="cw" style="height:110px"><canvas id="cMG"></canvas></div><div class="dl" id="lMG"></div></div>`;
  requestAnimationFrame(()=>{donut('cMP',countBy(rows,'plan'),CP,'lMP');donut('cMC',countBy(rows,'cuota'),CC,'lMC');donut('cMG',countBy(rows,'pago'),CPG,'lMG');});
}

function renderTabla(){
  const rows=getF(),mon=getMon(rows);
  let ac=0;
  document.getElementById('tbl-sub').textContent=`${rows.length} registros en el rango seleccionado`;
  const html=mon.map(d=>{
    ac+=d.net;
    const ret=d.n>0?Math.round((1-d.b/d.n)*100):100;
    const bc=ret>=80?'kg':ret>=60?'ka':'kr';
    const yr=d.m.startsWith('2026')?'26':'25';
    return `<tr><td style="font-weight:500">${d.lbl}</td><td style="text-align:right"><span style="font-size:10px;padding:2px 6px;border-radius:20px;background:${yr==='26'?'#e6f1fb':'#eaf3de'};color:${yr==='26'?'#0c447c':'#27500a'}">${yr==='26'?'2026':'2025'}</span></td><td style="text-align:right;color:#185fa5;font-weight:500">+${d.n}</td><td style="text-align:right;color:#a32d2d;font-weight:500">${d.b}</td><td style="text-align:right;color:${d.net>=0?'#0f6e56':'#a32d2d'};font-weight:500">${d.net>=0?'+':''}">${d.net}</td><td style="text-align:right;color:var(--color-text-secondary)">${ac}</td><td style="text-align:right"><span class="kpill ${bc}">${ret}%</span></td></tr>`;
  }).join('');
  document.getElementById('tblMain').innerHTML=`<thead><tr><th>Mes</th><th style="text-align:right">Año</th><th style="text-align:right">Altas</th><th style="text-align:right">Bajas</th><th style="text-align:right">Neto</th><th style="text-align:right">Acum.</th><th style="text-align:right">Retención*</th></tr></thead><tbody>${html||'<tr><td colspan="7" class="empty">Sin datos para el rango seleccionado</td></tr>'}</tbody>`;
}

function renderAll(){updateInfo();renderResumen();renderMensual();renderMix();renderTabla();}

['fDesde','fHasta','fPlan','fCuota','fPago','fEstado'].forEach(id=>{
  document.getElementById(id).addEventListener('change',renderAll);
});

renderAll();
</script>
</body>
</html>
