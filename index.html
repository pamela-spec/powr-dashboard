<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POWR — Dashboard Socios</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    :root{--bg1:#fff;--bg2:#f5f5f0;--bg3:#eeeee9;--tx1:#1a1a18;--tx2:#5f5e5a;--tx3:#888780;--bd1:rgba(0,0,0,.35);--bd2:rgba(0,0,0,.22);--bd3:rgba(0,0,0,.12);--rm:8px;--rl:12px}
    @media(prefers-color-scheme:dark){:root{--bg1:#1e1e1c;--bg2:#2a2a27;--bg3:#252523;--tx1:#f0efe9;--tx2:#b4b2a9;--tx3:#888780;--bd1:rgba(255,255,255,.28);--bd2:rgba(255,255,255,.18);--bd3:rgba(255,255,255,.10)}}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg3);color:var(--tx1);min-height:100vh}
    .page{max-width:920px;margin:0 auto;padding:20px 16px 40px}
    .hdr{padding:14px 0 12px;border-bottom:.5px solid var(--bd3);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .brand{display:flex;align-items:center;gap:10px}
    .bi{width:34px;height:34px;border-radius:9px;background:#185fa5;display:flex;align-items:center;justify-content:center}
    .bi i{color:#fff;font-size:17px}
    .bt p:first-child{font-size:15px;font-weight:500;color:var(--tx1)}
    .bt p:last-child{font-size:11px;color:var(--tx3);margin-top:1px}
    .lp{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#0f6e56;background:#e1f5ee;padding:3px 10px;border-radius:20px}
    .ld0{width:6px;height:6px;border-radius:50%;background:#1d9e75}
    .fil{background:var(--bg2);border-radius:var(--rl);padding:12px 14px;margin-bottom:14px}
    .fr{display:flex;flex-wrap:wrap;align-items:center;gap:8px}
    .fr+.fr{margin-top:8px}
    .fl{font-size:11px;font-weight:500;color:var(--tx2);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
    .fs{font-size:12px;padding:5px 8px;border-radius:var(--rm);border:.5px solid var(--bd2);background:var(--bg1);color:var(--tx1);cursor:pointer;min-width:108px}
    .fi{font-size:12px;padding:5px 8px;border-radius:var(--rm);border:.5px solid var(--bd2);background:var(--bg1);color:var(--tx1);width:108px}
    .fc{font-size:11px;padding:5px 10px;border-radius:var(--rm);border:.5px solid var(--bd2);background:transparent;color:var(--tx2);cursor:pointer;display:flex;align-items:center;gap:4px}
    .sep{width:.5px;height:20px;background:var(--bd2);margin:0 2px}
    .fi-info{font-size:11px;color:var(--tx3);margin-top:6px;padding-top:6px;border-top:.5px solid var(--bd3)}
    .nav{display:flex;border-bottom:.5px solid var(--bd3);margin-bottom:14px}
    .nb{padding:7px 14px;font-size:13px;cursor:pointer;background:transparent;border:none;color:var(--tx2);border-bottom:2px solid transparent;display:flex;align-items:center;gap:5px;margin-bottom:-1px}
    .nb i{font-size:13px}
    .nb.on{color:#185fa5;border-bottom-color:#185fa5;font-weight:500}
    .kg-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:14px}
    .kc{background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--rl);padding:11px 13px}
    .kc.ag{border-left:3px solid #1d9e75;border-radius:0 var(--rl) var(--rl) 0;padding-left:10px}
    .kc.ar{border-left:3px solid #a32d2d;border-radius:0 var(--rl) var(--rl) 0;padding-left:10px}
    .kc.ab{border-left:3px solid #ba7517;border-radius:0 var(--rl) var(--rl) 0;padding-left:10px}
    .kl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
    .kv{font-size:21px;font-weight:500;color:var(--tx1);line-height:1}
    .kv.g{color:#0f6e56}.kv.r{color:#a32d2d}.kv.b{color:#185fa5}
    .ks{font-size:10px;color:var(--tx3);margin-top:2px}
    .pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:500}
    .pg{background:#eaf3de;color:#27500a}.pr{background:#fcebeb;color:#791f1f}.pa{background:#faeeda;color:#633806}
    .sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;flex-wrap:wrap;gap:6px}
    .st{font-size:12px;font-weight:500;color:var(--tx2);display:flex;align-items:center;gap:5px}
    .st i{font-size:13px}
    .tgw{display:flex;background:var(--bg2);border-radius:20px;padding:2px;gap:2px}
    .tg{padding:3px 10px;border-radius:18px;font-size:11px;cursor:pointer;background:transparent;border:none;color:var(--tx2)}
    .tg.on{background:var(--bg1);color:var(--tx1);font-weight:500;border:.5px solid var(--bd2)}
    .leg{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:7px}
    .leg span{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
    .ld{width:9px;height:9px;border-radius:2px;flex-shrink:0}
    .ll{width:16px;height:3px;border-radius:2px;flex-shrink:0}
    .cw{position:relative;width:100%}
    .dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:10px;margin-top:12px}
    .dc{background:var(--bg1);border:.5px solid var(--bd3);border-radius:var(--rl);padding:11px 13px}
    .dt{font-size:11px;font-weight:500;color:var(--tx2);margin-bottom:7px;display:flex;align-items:center;gap:4px}
    .dt i{font-size:13px}
    .dl{display:flex;flex-direction:column;gap:4px;margin-top:5px}
    .dl span{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
    .dl .dv{margin-left:auto;font-size:11px;font-weight:500;color:var(--tx1)}
    .hr{height:.5px;background:var(--bd3);margin:13px 0}
    .tw{overflow-x:auto;border-radius:var(--rl);border:.5px solid var(--bd3)}
    table{width:100%;border-collapse:collapse;font-size:12px}
    th{padding:8px 11px;border-bottom:.5px solid var(--bd2);color:var(--tx2);font-weight:500;text-align:left;background:var(--bg2);white-space:nowrap}
    td{padding:7px 11px;border-bottom:.5px solid var(--bd3);color:var(--tx1);white-space:nowrap}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--bg2)}
    .note{font-size:10px;color:var(--tx3);margin-top:7px}
    .dbw{display:flex;gap:4px}
    .db{padding:4px 10px;border-radius:var(--rm);border:.5px solid var(--bd2);font-size:11px;cursor:pointer;background:transparent;color:var(--tx2)}
    .db.on{background:#e6f1fb;color:#0c447c;border-color:#185fa5;font-weight:500}
  </style>
</head>
<body>
<div class="page">
  <div class="hdr">
    <div class="brand">
      <div class="bi"><i class="ti ti-chart-bar"></i></div>
      <div class="bt"><p>POWR — socios</p><p>Rio Mixcoac</p></div>
    </div>
    <span class="lp"><span class="ld0"></span>En vivo · Jun 2026</span>
  </div>

  <div class="fil">
    <div class="fr">
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Desde</span><input class="fi" type="date" id="fD"></div>
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Hasta</span><input class="fi" type="date" id="fH"></div>
      <span class="sep"></span>
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Plan</span>
        <select class="fs" id="fP"><option value="">Todos</option><option value="Básico">Básico</option><option value="Resultados">Resultados</option></select>
      </div>
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Frecuencia</span>
        <select class="fs" id="fC"><option value="">Todas</option><option value="MENSUAL">Mensual</option><option value="SEMESTRAL">Semestral</option><option value="ANUAL">Anual</option><option value="TRIMESTRAL">Trimestral</option><option value="BIMESTRAL">Bimestral</option></select>
      </div>
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Forma de pago</span>
        <select class="fs" id="fG"><option value="">Todas</option><option value="Tarjeta">Tarjeta</option><option value="OpenPay Recurrente">OpenPay</option><option value="Caja">Caja</option></select>
      </div>
      <div style="display:flex;align-items:center;gap:6px"><span class="fl">Estado</span>
        <select class="fs" id="fE"><option value="">Todos</option><option value="ACTIVO">Activo</option><option value="BAJA">Baja</option><option value="AUSENTE">Ausente</option></select>
      </div>
      <button class="fc" onclick="clrF()"><i class="ti ti-x" style="font-size:11px"></i>Limpiar</button>
    </div>
    <div class="fi-info" id="fInfo"></div>
  </div>

  <div class="nav">
    <button class="nb on" id="t-r" onclick="show('r')"><i class="ti ti-layout-dashboard"></i>Resumen</button>
    <button class="nb" id="t-m" onclick="show('m')"><i class="ti ti-trending-up"></i>Mensual</button>
    <button class="nb" id="t-x" onclick="show('x')"><i class="ti ti-chart-donut"></i>Mix</button>
    <button class="nb" id="t-t" onclick="show('t')"><i class="ti ti-table"></i>Tabla</button>
  </div>

  <div id="v-r">
    <div class="kg-grid" id="kpis"></div>
    <div class="sh">
      <span class="st"><i class="ti ti-chart-bar"></i>Altas y bajas por mes</span>
      <div class="tgw"><button class="tg on" id="rn" onclick="sT('r','n')">Número</button><button class="tg" id="rp" onclick="sT('r','p')">Porcentaje</button></div>
    </div>
    <div class="leg"><span><span class="ld" style="background:#b5d4f4"></span>Altas</span><span><span class="ld" style="background:#f7c1c1"></span>Bajas</span><span><span class="ll" style="background:#1d9e75"></span>Acumulado</span></div>
    <div class="cw" style="height:230px"><canvas id="cR"></canvas></div>
    <div class="dg" id="dnR"></div>
  </div>

  <div id="v-m" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-trending-up"></i>Altas, bajas y neto</span>
      <div class="tgw"><button class="tg on" id="mn" onclick="sT('m','n')">Número</button><button class="tg" id="mp" onclick="sT('m','p')">Porcentaje</button></div>
    </div>
    <div class="leg"><span><span class="ld" style="background:#b5d4f4"></span>Altas</span><span><span class="ld" style="background:#f7c1c1"></span>Bajas</span><span><span class="ll" style="background:#1d9e75"></span>Neto</span></div>
    <div class="cw" style="height:240px"><canvas id="cM"></canvas></div>
    <div class="hr"></div>
    <div class="sh" style="margin-bottom:7px"><span class="st"><i class="ti ti-shield-check"></i>Retención mensual</span></div>
    <div class="cw" style="height:155px"><canvas id="cRet"></canvas></div>
  </div>

  <div id="v-x" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-stack"></i>Evolución 100% apilado</span>
      <div class="dbw"><button class="db on" id="dp" onclick="sDim('plan')">Plan</button><button class="db" id="dc" onclick="sDim('cuota')">Frecuencia</button><button class="db" id="dg" onclick="sDim('pago')">Pago</button></div>
    </div>
    <div class="leg" id="lSt" style="margin-bottom:7px"></div>
    <div class="cw" style="height:240px"><canvas id="cSt"></canvas></div>
    <div class="dg" id="dnX"></div>
  </div>

  <div id="v-t" style="display:none">
    <div class="sh">
      <span class="st"><i class="ti ti-table"></i>Detalle mensual</span>
      <span id="tSub" style="font-size:11px;color:var(--tx3)"></span>
    </div>
    <div class="tw"><table id="tbl"></table></div>
    <p class="note">* Retención = 1 − (bajas del mes / altas del mes)</p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:function(v){return p?(v<0?v+'%':'+'+v+'%'):(v<0?v:'+'+v);},font:{size:11}}},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}}}}});
  const rets=mon.map(d=>d.n>0?Math.round((1-d.b/d.n)*100):100);
  mkC('cRet',{type:'line',data:{labels:mon.map(d=>d.lbl),datasets:[{label:'Retención %',data:rets,borderColor:'#1d9e75',backgroundColor:'rgba(29,158,117,.07)',fill:true,borderWidth:2,tension:.3,pointRadius:3,pointBackgroundColor:'#1d9e75'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{min:0,max:110,grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:function(v){return v+'%';},font:{size:11}}},x:{grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}}}}});
}

function rX(){
  const rows=gF(),meses=gMeses(rows);
  const CMAP=curDim==='plan'?CP:curDim==='cuota'?CC:CPG;
  const keys=[...new Set(rows.map(r=>r[curDim]))].filter(Boolean);
  const datasets=keys.map(function(k){return{label:k,data:meses.map(function(m){var s=rows.filter(function(r){return r.mes===m;});return s.length?Math.round(s.filter(function(r){return r[curDim]===k;}).length/s.length*100):0;}),backgroundColor:CMAP[k]||'#888',borderWidth:0};}).filter(function(ds){return ds.data.some(function(v){return v>0;});});
  document.getElementById('lSt').innerHTML=datasets.map(function(ds){return '<span><span class="ld" style="background:'+ds.backgroundColor+'"></span>'+ds.label.replace('OpenPay Recurrente','OpenPay')+'</span>';}).join('');
  mkC('cSt',{type:'bar',data:{labels:meses.map(function(m){return ML[m];}),datasets:datasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{stacked:true,grid:{display:false},ticks:{autoSkip:false,maxRotation:45,font:{size:11}}},y:{stacked:true,max:100,grid:{color:'rgba(128,128,128,.07)'},ticks:{callback:function(v){return v+'%';},font:{size:11}}}}}});
  const el=document.getElementById('dnX');
  el.innerHTML='<div class="dc"><p class="dt"><i class="ti ti-id-badge"></i>Por plan</p><div class="cw" style="height:110px"><canvas id="cXP"></canvas></div><div class="dl" id="lXP"></div></div><div class="dc"><p class="dt"><i class="ti ti-calendar-repeat"></i>Por frecuencia</p><div class="cw" style="height:110px"><canvas id="cXC"></canvas></div><div class="dl" id="lXC"></div></div><div class="dc"><p class="dt"><i class="ti ti-credit-card"></i>Por forma de pago</p><div class="cw" style="height:110px"><canvas id="cXG"></canvas></div><div class="dl" id="lXG"></div></div>';
  requestAnimationFrame(function(){donut('cXP',cBy(rows,'plan'),CP,'lXP');donut('cXC',cBy(rows,'cuota'),CC,'lXC');donut('cXG',cBy(rows,'pago'),CPG,'lXG');});
}

function rT(){
  const rows=gF(),mon=gMon(rows);
  let ac=0;
  document.getElementById('tSub').textContent=rows.length+' registros en el rango seleccionado';
  var html=mon.map(function(d){
    ac+=d.net;
    var ret=d.n>0?Math.round((1-d.b/d.n)*100):100;
    var bc=ret>=80?'pg':ret>=60?'pa':'pr';
    var yr=d.m.startsWith('2026')?'2026':'2025';
    var yrBg=yr==='2026'?'#e6f1fb':'#eaf3de';
    var yrCl=yr==='2026'?'#0c447c':'#27500a';
    var netCl=d.net>=0?'#0f6e56':'#a32d2d';
    var netSign=d.net>=0?'+':'';
    return '<tr><td style="font-weight:500">'+d.lbl+'</td><td style="text-align:right"><span style="font-size:10px;padding:2px 6px;border-radius:20px;background:'+yrBg+';color:'+yrCl+'">'+yr+'</span></td><td style="text-align:right;color:#185fa5;font-weight:500">+'+d.n+'</td><td style="text-align:right;color:#a32d2d;font-weight:500">'+d.b+'</td><td style="text-align:right;color:'+netCl+';font-weight:500">'+netSign+d.net+'</td><td style="text-align:right;color:var(--tx2)">'+ac+'</td><td style="text-align:right"><span class="pill '+bc+'">'+ret+'%</span></td></tr>';
  }).join('');
  document.getElementById('tbl').innerHTML='<thead><tr><th>Mes</th><th style="text-align:right">Año</th><th style="text-align:right">Altas</th><th style="text-align:right">Bajas</th><th style="text-align:right">Neto</th><th style="text-align:right">Acum.</th><th style="text-align:right">Retención*</th></tr></thead><tbody>'+(html||'<tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--tx3)">Sin datos para el rango seleccionado</td></tr>')+'</tbody>';
}

function renderAll(){uInfo();rR();rM();rX();rT();}

document.getElementById('fD').value='2025-03-01';
document.getElementById('fH').value='2026-05-31';
['fD','fH','fP','fC','fG','fE'].forEach(function(id){
  document.getElementById(id).addEventListener('change',renderAll);
});
renderAll();
</script>
</body>
</html>
